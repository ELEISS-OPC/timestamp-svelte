services:
  backend:
    image: eleissopc/timestamp:backend
    container_name: timestamp-svelte-backend-dev
    restart: always
    ports:
      - "${TIMESTAMP_BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-timestamp}
      S3_ENDPOINT_URL: http://s3:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-timestamp}
      S3_REGION: ${S3_REGION:-apac}
      MODE: development
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-supersecretkey}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-525600}
    depends_on:
      db:
        condition: service_healthy
      s3:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 healthcheck.py || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
  db:
    hostname: localhost
    image: postgres:18.1
    container_name: timestamp-svelte-postgres-dev
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-timestamp}
    volumes:
      - ./.init:/docker-entrypoint-initdb.d:ro
      - timestamp_db_data:/var/lib/postgresql/
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-timestamp} -h localhost -p 5432",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
  s3:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: timestamp-svelte-minio-dev
    ports:
      - "${S3_PORT:-9000}:9000" # S3 API
      - "${S3_CONSOLE_PORT:-9001}:9001" # Web Console
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - timestamp_minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  # This service initializes the MinIO bucket
  s3-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    container_name: timestamp-svelte-minio-dev-init
    depends_on:
      s3:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://s3:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      if mc ls local > /dev/null 2>&1; then
        echo 'Connection successful. Creating bucket...';
        mc mb --ignore-existing local/${S3_BUCKET_NAME:-timestamp};
        mc anonymous set download local/${S3_BUCKET_NAME:-timestamp};
        echo 'Bucket creation sequence complete.';
      else
        echo 'ERROR: Could not connect to MinIO service';
        exit 1;
      fi"
    restart: "no"
  pgadmin:
    container_name: timestamp-svelte-pgadmin-dev
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_MAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PW}
    ports:
      - "5050:80"
    restart: always

volumes:
  timestamp_db_data:
  timestamp_minio_data:
  timestamp_pgadmin_data:
